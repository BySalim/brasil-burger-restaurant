# =========================================
# BRASIL BURGER - Configuration
# =========================================

# Application
app.name=Brasil Burger Manager
app.version=1.0.0
app.environment=${APP_ENV:production}

# Base de donnees Neon (PostgreSQL)
db.url=${DB_URL}
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}
db.driver=org.postgresql.Driver

# Pool de connexions HikariCP
db.pool.size=10
db.pool.timeout=30000
db.pool.max-lifetime=1800000

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}
cloudinary.folder.articles=brasil-burger/articles

# Images
image.max.size=5242880
image.allowed.formats=jpg,jpeg,png,webp